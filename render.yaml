services:
  # Servicio Web para el Backend (FastAPI)
  - type: web
    name: investtracker-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: investtracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

# Base de Datos PostgreSQL Administrada (Persistente)
databases:
  - name: investtracker-db
    plan: free
